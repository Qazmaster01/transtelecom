version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: retail_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: asdnmk
      POSTGRES_DB: krisha
    ports:
      - "5433:5432"   # 👈 ВАЖНО: DBeaver подключается сюда
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d krisha"]
      interval: 5s
      timeout: 5s
      retries: 10


  airflow-init:
    image: apache/airflow:2.7.3
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:asdnmk@postgres:5432/krisha
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__CORE__FERNET_KEY: "4CoNTel1wsaCaq5WugvD81-MyM9yCo-5uUSgci1qSBM="
      AIRFLOW__WEBSERVER__SECRET_KEY: "super-secret-key-123"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"

      # 👇 Airflow connection (важно для PostgresOperator)
      AIRFLOW_CONN_POSTGRES_DEFAULT: postgresql://postgres:asdnmk@postgres:5432/krisha

    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com
      "
    volumes:
      - ./dags:/opt/airflow/dags
      - ./sql:/opt/airflow/sql
      - ./data:/opt/airflow/data


  airflow-webserver:
    image: apache/airflow:2.7.3
    depends_on:
      - airflow-init
    environment: *airflow-env
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./sql:/opt/airflow/sql
      - ./data:/opt/airflow/data


  airflow-scheduler:
    image: apache/airflow:2.7.3
    depends_on:
      - airflow-init
    environment: *airflow-env
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./sql:/opt/airflow/sql
      - ./data:/opt/airflow/data


volumes:
  pgdata: